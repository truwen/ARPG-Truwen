name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  basic-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository structure
        run: ls -R

      - name: Validate core files exist
        run: |
          test -f index.html
          test -f style.css

      - name: Validate core directories exist
        run: |
          test -d js
          test -d assets || mkdir -p assets
          test -d data || mkdir -p data

      - name: Validate expected JS modules exist when present
        run: |
          expected_files=(
            "js/main.js"
            "js/game.js"
            "js/input.js"
            "js/renderer.js"
            "js/player.js"
            "js/enemy.js"
            "js/combat.js"
            "js/loot.js"
            "js/inventory.js"
            "js/items.js"
            "js/stats.js"
            "js/skills.js"
            "js/essences.js"
            "js/abilities.js"
            "js/ui.js"
            "js/save.js"
          )

          missing=0
          for file in "${expected_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing expected file: $file"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "One or more expected JS module files are missing."
            exit 1
          fi

      - name: Basic HTML sanity check
        run: |
          grep -qi "<html" index.html
          grep -qi "<canvas" index.html

      - name: Basic CSS sanity check
        run: |
          test -s style.css

      - name: Basic JS syntax smoke check
        run: |
          node --version
          for file in js/*.js; do
            node --check "$file"
          done
